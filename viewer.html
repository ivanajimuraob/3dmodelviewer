<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Viewer</title>

  <!-- ✅ Fix module resolution -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <!-- ✅ model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      text-align: center;
    }

    #debug {
      background: #222;
      color: #0f0;
      padding: 10px;
      margin-bottom: 10px;
      font-family: monospace;
      text-align: left;
    }

    model-viewer {
      width: 100%;
      height: 400px;
      background: #eee;
    }
  </style>
</head>

<body>

<h2>Upload 3D Model (.stl, .obj, .glb)</h2>

<div id="debug">Loading debug info...</div>

<input type="file" id="fileInput" accept=".stl,.obj,.glb">

<br><br>

<model-viewer id="viewer" camera-controls auto-rotate></model-viewer>

<script type="module">

import * as THREE from 'three';  // ✅ now works!
import { STLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js';
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js';
import { GLTFExporter } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/exporters/GLTFExporter.js';

const debug = document.getElementById('debug');

debug.innerHTML = `
✅ Module loaded<br>
Three.js REVISION: ${THREE.REVISION}<br>
STLLoader loaded: ${typeof STLLoader !== 'undefined'}<br>
`;

const fileInput = document.getElementById('fileInput');
const viewer = document.getElementById('viewer');

fileInput.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === "glb") {
    viewer.src = URL.createObjectURL(file);
    return;
  }

  const reader = new FileReader();

  reader.onload = (e) => {
    const scene = new THREE.Scene();

    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(light);

    if (ext === "stl") {
      const loader = new STLLoader();
      const geometry = loader.parse(e.target.result);

      const material = new THREE.MeshStandardMaterial({ color: 0x888888 });
      const mesh = new THREE.Mesh(geometry, material);

      scene.add(mesh);
    }

    if (ext === "obj") {
      const loader = new OBJLoader();
      const obj = loader.parse(e.target.result);
      scene.add(obj);
    }

    const exporter = new GLTFExporter();

    exporter.parse(
      scene,
      (result) => {
        const blob = new Blob([result], { type: 'model/gltf-binary' });
        viewer.src = URL.createObjectURL(blob);
      },
      { binary: true }
    );
  };

  if (ext === "stl") {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
});

</script>

</body>
</html>
``
