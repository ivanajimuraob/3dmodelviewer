<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Viewer</title>

<!-- Import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<!-- model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
  body {
    font-family: Arial;
    margin: 0;
    text-align: center;
    overflow: hidden;
  }

  h2 {
    margin: 10px 0;
  }

  #viewer3D {
    width: 100%;
    height: 400px;
    display: none;
  }

  model-viewer {
    width: 100%;
    height: 400px;
    background: #eee;
  }

  canvas {
    width: 100% !important;
    height: 400px !important;
  }
</style>
</head>

<body>

<h2>Upload 3D Model (.stl, .obj, .glb)</h2>

<input type="file" id="fileInput" accept=".stl,.obj,.glb">

<br><br>

<!-- GLB viewer -->
<model-viewer id="mv" camera-controls auto-rotate></model-viewer>

<!-- Three.js viewer -->
<div id="viewer3D"></div>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js';
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js';

const input = document.getElementById('fileInput');
const mv = document.getElementById('mv');
const container = document.getElementById('viewer3D');

let renderer, scene, camera;

/* ✅ Setup Three.js */
function setupThree() {
  container.innerHTML = "";

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    45,
    container.clientWidth / 400,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, 400);
  container.appendChild(renderer.domElement);

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
  scene.add(light);

  camera.position.set(0, 0, 5);

  animate();
}

/* ✅ Render loop */
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

/* ✅ Load file */
input.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  // ✅ GLB → model-viewer
  if (ext === "glb") {
    container.style.display = "none";
    mv.style.display = "block";

    mv.src = URL.createObjectURL(file);
    return;
  }

  // ✅ STL / OBJ → Three.js
  mv.style.display = "none";
  container.style.display = "block";

  setupThree();

  const reader = new FileReader();

  reader.onload = (event) => {

    if (ext === "stl") {
      const loader = new STLLoader();
      const geometry = loader.parse(event.target.result);

      const material = new THREE.MeshStandardMaterial({
        color: 0x888888
      });

      const mesh = new THREE.Mesh(geometry, material);

      normalize(mesh, geometry);
      scene.add(mesh);
    }

    if (ext === "obj") {
      const loader = new OBJLoader();
      const obj = loader.parse(event.target.result);

      scene.add(obj);
    }
  };

  if (ext === "stl") {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }

});

/* ✅ Center + scale model */
function normalize(mesh, geometry) {
  geometry.computeBoundingBox();

  const box = geometry.boundingBox;

  const size = new THREE.Vector3();
  box.getSize(size);

  const center = new THREE.Vector3();
  box.getCenter(center);

  mesh.position.sub(center);

  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 2 / maxDim;

  mesh.scale.set(scale, scale, scale);
}

</script>

</body>
</html>
