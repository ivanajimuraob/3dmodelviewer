<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- Three.js + loaders -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/exporters/GLTFExporter.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

<h3>Upload 3D Model (.stl, .obj, .glb)</h3>

<input type="file" id="fileInput" accept=".stl,.obj,.glb" />

<model-viewer
  id="viewer"
  style="width:100%; height:400px; background:#eee;"
  camera-controls
  auto-rotate>
</model-viewer>

<script>
const fileInput = document.getElementById('fileInput');
const viewer = document.getElementById('viewer');

fileInput.addEventListener('change', async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const extension = file.name.split('.').pop().toLowerCase();

  // ✅ If already GLB → load directly
  if (extension === 'glb') {
    viewer.src = URL.createObjectURL(file);
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const scene = new THREE.Scene();

    // Basic lighting
    const light = new THREE.HemisphereLight(0xffffff, 0x444444);
    scene.add(light);

    let loader;

    if (extension === 'stl') {
      loader = new THREE.STLLoader();
      const geometry = loader.parse(e.target.result);
      const material = new THREE.MeshStandardMaterial({ color: 0x999999 });
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

    } else if (extension === 'obj') {
      loader = new THREE.OBJLoader();
      const obj = loader.parse(e.target.result);
      scene.add(obj);
    }

    // ✅ Convert to GLB
    const exporter = new THREE.GLTFExporter();

    exporter.parse(
      scene,
      function (result) {
        const blob = new Blob([result], { type: 'model/gltf-binary' });
        const url = URL.createObjectURL(blob);

        // Load in model-viewer
        viewer.src = url;
      },
      { binary: true }
    );
  };

  if (extension === 'stl') {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
});
</script>

</body>
</html>
