<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
 <!-- model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- Three.js core -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- ✅ Use NON-module loaders -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/exporters/GLTFExporter.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

<h3>Upload 3D Model (.stl, .obj, .glb)</h3>

<input type="file" id="fileInput" accept=".stl,.obj,.glb" />


<div id="debug" style="padding:10px; background:#222; color:#0f0; font-family:monospace;">
  Loading debug info...
</div>

  
<model-viewer
  id="viewer"
  style="width:100%; height:400px; background:#eee;"
  camera-controls
  auto-rotate>
</model-viewer>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { STLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js';
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js';
import { GLTFExporter } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/exporters/GLTFExporter.js';

const debug = document.getElementById('debug');

// ✅ Show version + loader status
debug.innerHTML = `
Three.js REVISION: ${THREE.REVISION}<br>
STLLoader loaded: ${typeof STLLoader !== 'undefined'}<br>
OBJLoader loaded: ${typeof OBJLoader !== 'undefined'}<br>
GLTFExporter loaded: ${typeof GLTFExporter !== 'undefined'}<br>
`;

const fileInput = document.getElementById('fileInput');
const viewer = document.getElementById('viewer');

fileInput.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === "glb") {
    viewer.src = URL.createObjectURL(file);
    return;
  }

  const reader = new FileReader();

  reader.onload = (e) => {
    const scene = new THREE.Scene();

    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(light);

    try {
      if (ext === "stl") {
        const loader = new STLLoader(); // ✅ now module-based
        const geometry = loader.parse(e.target.result);

        const material = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const mesh = new THREE.Mesh(geometry, material);

        scene.add(mesh);

      } else if (ext === "obj") {
        const loader = new OBJLoader();
        const obj = loader.parse(e.target.result);
        scene.add(obj);
      }

      const exporter = new GLTFExporter();

      exporter.parse(
        scene,
        (result) => {
          const blob = new Blob([result], { type: 'model/gltf-binary' });
          viewer.src = URL.createObjectURL(blob);
        },
        { binary: true }
      );

    } catch (err) {
      debug.innerHTML += `<br><span style="color:red;">ERROR: ${err.message}</span>`;
      console.error(err);
    }
  };

  if (ext === "stl") {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
});
</script>


</body>
</html>
