<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Viewer (STL / OBJ / GLB)</title>

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      text-align: center;
    }

    #debug {
      padding: 10px;
      margin-bottom: 10px;
      background: #222;
      color: #0f0;
      font-family: monospace;
      text-align: left;
    }

    model-viewer {
      width: 100%;
      height: 400px;
      background: #eee;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>Upload 3D Model (.stl, .obj, .glb)</h2>

<!-- Debug panel -->
<div id="debug">Loading debug info...</div>

<!-- File input -->
<input type="file" id="fileInput" accept=".stl,.obj,.glb">

<br><br>

<!-- Viewer -->
<model-viewer
  id="viewer"
  camera-controls
  auto-rotate
  shadow-intensity="1">
</model-viewer>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { STLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js';
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/OBJLoader.js';
import { GLTFExporter } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/exporters/GLTFExporter.js';

const debug = document.getElementById('debug');
const fileInput = document.getElementById('fileInput');
const viewer = document.getElementById('viewer');

/* ✅ Show debug info */
debug.innerHTML = `
Three.js REVISION: ${THREE.REVISION}<br>
STLLoader loaded: ${typeof STLLoader !== 'undefined'}<br>
OBJLoader loaded: ${typeof OBJLoader !== 'undefined'}<br>
GLTFExporter loaded: ${typeof GLTFExporter !== 'undefined'}<br>
`;

/* ✅ File handling */
fileInput.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  // ✅ Direct GLB load
  if (ext === "glb") {
    viewer.src = URL.createObjectURL(file);
    return;
  }

  const reader = new FileReader();

  reader.onload = (e) => {
    const scene = new THREE.Scene();

    // lighting
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(light);

    try {
      if (ext === "stl") {
        const loader = new STLLoader();
        const geometry = loader.parse(e.target.result);

        geometry.computeVertexNormals();

        const material = new THREE.MeshStandardMaterial({
          color: 0x888888
        });

        const mesh = new THREE.Mesh(geometry, material);

        centerAndScale(mesh, geometry);
        scene.add(mesh);

      } else if (ext === "obj") {
        const loader = new OBJLoader();
        const obj = loader.parse(e.target.result);

        scene.add(obj);
      }

      const exporter = new GLTFExporter();

      exporter.parse(
        scene,
        (result) => {
          const blob = new Blob([result], { type: 'model/gltf-binary' });
          viewer.src = URL.createObjectURL(blob);
        },
        { binary: true }
      );

    } catch (err) {
      debug.innerHTML += `<br><span style="color:red;">ERROR: ${err.message}</span>`;
      console.error(err);
    }
  };

  if (ext === "stl") {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
});

/* ✅ Helper: center + scale model */
function centerAndScale(mesh, geometry) {
  geometry.computeBoundingBox();

  const box = geometry.boundingBox;

  const center = new THREE.Vector3();
  box.getCenter(center);
  mesh.position.sub(center);

  const size = new THREE.Vector3();
  box.getSize(size);

  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 2 / maxDim;

  mesh.scale.set(scale, scale, scale);
}

</script>

</body>
</html>
