<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
 <!-- model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- Three.js core -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- ✅ Use NON-module loaders -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/exporters/GLTFExporter.js"></script>
</head>

<body style="font-family: Arial; text-align:center;">

<h3>Upload 3D Model (.stl, .obj, .glb)</h3>

<input type="file" id="fileInput" accept=".stl,.obj,.glb" />

<model-viewer
  id="viewer"
  style="width:100%; height:400px; background:#eee;"
  camera-controls
  auto-rotate>
</model-viewer>

<script>
const fileInput = document.getElementById('fileInput');
const viewer = document.getElementById('viewer');

fileInput.addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === "glb") {
    viewer.src = URL.createObjectURL(file);
    return;
  }

  const reader = new FileReader();

  reader.onload = (e) => {
    const scene = new THREE.Scene();

    // lighting
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(light);

    if (ext === "stl") {
      const loader = new THREE.STLLoader();
      const geometry = loader.parse(e.target.result);

      geometry.computeVertexNormals();

      const material = new THREE.MeshStandardMaterial({
        color: 0x888888,
      });

      const mesh = new THREE.Mesh(geometry, material);

      // ✅ CENTER + SCALE (important for visibility!)
      geometry.computeBoundingBox();
      const box = geometry.boundingBox;
      const center = new THREE.Vector3();
      box.getCenter(center);
      mesh.position.sub(center);

      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2 / maxDim;
      mesh.scale.set(scale, scale, scale);

      scene.add(mesh);

    } else if (ext === "obj") {
      const loader = new THREE.OBJLoader();
      const obj = loader.parse(e.target.result);
      scene.add(obj);
    }

    const exporter = new THREE.GLTFExporter();

    exporter.parse(
      scene,
      (result) => {
        const blob = new Blob([result], { type: 'model/gltf-binary' });
        viewer.src = URL.createObjectURL(blob);
      },
      { binary: true }
    );
  };

  if (ext === "stl") {
    reader.readAsArrayBuffer(file); // ✅ critical
  } else {
    reader.readAsText(file);
  }
});
</script>

</body>
</html>
